name: Merge To Main Release Pipeline

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  release-on-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true
    concurrency:
      group: release-main-pipeline
      cancel-in-progress: false
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide bump type
        id: bump_type
        shell: bash
        run: |
          has_major="${{ contains(github.event.pull_request.labels.*.name, 'semver:major') }}"
          has_minor="${{ contains(github.event.pull_request.labels.*.name, 'semver:minor') }}"

          if [[ "$has_major" == "true" && "$has_minor" == "true" ]]; then
            echo "PR has both semver:major and semver:minor labels. Keep exactly one." >&2
            exit 1
          fi

          if [[ "$has_major" == "true" ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$has_minor" == "true" ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump manifest versions
        id: bump
        env:
          BUMP_TYPE: ${{ steps.bump_type.outputs.type }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const files = ['package.json', 'manifest.json', 'manifest_firefox.json'];

          function parse(v) {
            const m = String(v).trim().match(/^(\d+)\.(\d+)\.(\d+)$/);
            if (!m) throw new Error(`Unsupported version format: ${v}`);
            return { major: Number(m[1]), minor: Number(m[2]), patch: Number(m[3]) };
          }

          function fmt(v) {
            return `${v.major}.${v.minor}.${v.patch}`;
          }

          function cmp(a, b) {
            if (a.major !== b.major) return a.major - b.major;
            if (a.minor !== b.minor) return a.minor - b.minor;
            return a.patch - b.patch;
          }

          function bump(v, type) {
            if (type === 'major') return { major: v.major + 1, minor: 0, patch: 0 };
            if (type === 'minor') return { major: v.major, minor: v.minor + 1, patch: 0 };
            if (type === 'patch') return { major: v.major, minor: v.minor, patch: v.patch + 1 };
            throw new Error(`Unsupported bump type: ${type}`);
          }

          const manifests = files.map((file) => ({ file, data: JSON.parse(fs.readFileSync(file, 'utf8')) }));
          const versions = manifests.map((m) => parse(m.data.version));
          const base = versions.reduce((max, current) => (cmp(current, max) > 0 ? current : max));
          const next = bump(base, process.env.BUMP_TYPE);
          const nextText = fmt(next);

          for (const m of manifests) {
            m.data.version = nextText;
            fs.writeFileSync(m.file, JSON.stringify(m.data, null, 2) + '\n', 'utf8');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${nextText}\n`);
          console.log(`Bumped manifest versions to ${nextText} (${process.env.BUMP_TYPE})`);
          NODE

      - name: Update CHANGELOG.md
        id: changelog
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.NEW_VERSION;
          const today = new Date().toISOString().slice(0, 10);
          const repo = process.env.GITHUB_REPOSITORY;

          function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          const raw = fs.readFileSync('CHANGELOG.md', 'utf8');
          const UNRELEASED_HEADER = '## [Unreleased]';

          // Extract the content between [Unreleased] and the next ## heading (or EOF).
          // Note: \Z is not a valid JS regex anchor, so we use a string-based approach.
          const unrIdx = raw.search(/^## \[Unreleased\]/m);
          let unreleasedBody = '';
          let updated = raw;

          if (unrIdx >= 0) {
            const afterHeader = raw.slice(unrIdx + UNRELEASED_HEADER.length);
            const nextSecIdx = afterHeader.search(/^## \[/m);
            unreleasedBody = (nextSecIdx >= 0 ? afterHeader.slice(0, nextSecIdx) : afterHeader).trim();
            const trailing = nextSecIdx >= 0 ? afterHeader.slice(nextSecIdx) : '';

            // Build the new versioned section.
            const versionedSection = `## [${version}] - ${today}` +
              (unreleasedBody ? `\n${unreleasedBody}` : '\n### Changed\n- See PR for details.');

            // Replace [Unreleased] block with a fresh one + new versioned section.
            updated = raw.slice(0, unrIdx) + `${UNRELEASED_HEADER}\n\n${versionedSection}\n\n` + trailing;
          }

          // Update or insert the comparison links at the bottom.
          const prevVersionMatch = raw.match(
            new RegExp(`^\\[Unreleased\\]:\\s*https://github\\.com/[^\\n]+/compare/v([\\d]+\\.[\\d]+\\.[\\d]+)\\.\\.\\.HEAD`, 'm')
          );
          const prevVersion = prevVersionMatch ? prevVersionMatch[1] : null;

          const unreleasedLink = `[Unreleased]: https://github.com/${repo}/compare/v${version}...HEAD`;
          const versionLink = prevVersion
            ? `[${version}]: https://github.com/${repo}/compare/v${prevVersion}...v${version}`
            : `[${version}]: https://github.com/${repo}/releases/tag/v${version}`;

          if (updated.includes('[Unreleased]:')) {
            updated = updated.replace(/^\[Unreleased\]:[^\n]*/m, unreleasedLink);
          } else {
            updated = updated.trimEnd() + `\n\n${unreleasedLink}\n`;
          }

          if (updated.includes(`[${version}]:`)) {
            updated = updated.replace(new RegExp(`^\\[${escapeRegex(version)}\\]:[^\\n]*`, 'm'), versionLink);
          } else {
            updated = updated.trimEnd() + `\n${versionLink}\n`;
          }

          fs.writeFileSync('CHANGELOG.md', updated, 'utf8');

          // Write the release notes body to GITHUB_OUTPUT (multiline safe).
          const delimiter = 'CHANGELOG_EOF';
          const notes = unreleasedBody || 'No changelog entry for this release.';
          const output = `changelog_notes<<${delimiter}\n${notes}\n${delimiter}\n`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, output);

          console.log(`CHANGELOG.md updated for v${version}`);
          NODE

      - name: Commit bump and create tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          if [ -z "$NEW_VERSION" ]; then
            echo "Missing NEW_VERSION output" >&2
            exit 1
          fi

          tag="v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json manifest_firefox.json CHANGELOG.md
          git commit -m "chore: bump manifest version to ${NEW_VERSION} after #${PR_NUMBER}"
          git push origin main

          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          git tag "${tag}"
          git push origin "${tag}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify AMO secrets
        run: |
          test -n "$AMO_JWT_ISSUER" || { echo "Missing secret: AMO_JWT_ISSUER"; exit 1; }
          test -n "$AMO_JWT_SECRET" || { echo "Missing secret: AMO_JWT_SECRET"; exit 1; }

      - name: Build and sign Firefox extension
        run: npm run sign:firefox

      - name: Collect signed artifact path
        id: artifact
        shell: bash
        run: |
          signed="$(ls -1t web-ext-artifacts/*.xpi | head -n 1 || true)"
          if [ -z "$signed" ]; then
            echo "No signed XPI found in web-ext-artifacts" >&2
            exit 1
          fi
          echo "signed_xpi=$signed" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload signed XPI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          CHANGELOG_NOTES: ${{ steps.changelog.outputs.changelog_notes }}
        shell: bash
        run: |
          tag="v${NEW_VERSION}"
          notes="${CHANGELOG_NOTES:-No changelog entry for this release.}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.artifact.outputs.signed_xpi }}" --clobber
          else
            gh release create "$tag" "${{ steps.artifact.outputs.signed_xpi }}" \
              --title "$tag" \
              --notes "$notes"
          fi
