name: PR Build Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate-changelog:
    name: Validate Changelog Updated
    runs-on: ubuntu-latest
    # Allow PRs labelled `skip-changelog` to bypass this check (e.g. CI-only changes).
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-changelog')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was updated
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git diff --name-only "${base}...${head}" | grep -q '^CHANGELOG\.md$'; then
            echo "::error::CHANGELOG.md was not updated in this PR."
            echo "Please add an entry under '## [Unreleased]' describing your changes."
            echo "If this PR has no user-facing changes, add the 'skip-changelog' label."
            exit 1
          fi
          echo "CHANGELOG.md updated — OK"


  validate-version-lockstep:
    name: Validate Version Lockstep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate version lock-step
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const chrome = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const firefox = JSON.parse(fs.readFileSync('manifest_firefox.json', 'utf8'));

          const versions = {
            'package.json': pkg.version,
            'manifest.json': chrome.version,
            'manifest_firefox.json': firefox.version
          };
          const unique = [...new Set(Object.values(versions))];
          if (unique.length !== 1) {
            console.error('Version mismatch detected:', versions);
            process.exit(1);
          }
          console.log(`Version lock-step valid: ${unique[0]}`);
          NODE

  build-firefox:
    name: Build Firefox Package
    runs-on: ubuntu-latest
    needs: validate-version-lockstep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Firefox extension package
        run: npm run build:firefox
